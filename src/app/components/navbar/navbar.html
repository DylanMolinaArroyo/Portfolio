<nav class="navbar" [class.scrolled]="hasShadow">
  <!-- Logo/Start -->
  <div class="nav-start">
    <div class="logo" (click)="scrollToSection('home')">
      <i class="pi pi-code"></i>
      <span>Portfolio</span>
    </div>
  </div>

  <!-- Menú Hamburguesa -->
  <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Toggle menu">
    <i class="pi {{ menuOpen ? 'pi-times' : 'pi-bars' }}"></i>
  </button>
  <div class="nav-content" [class.active]="menuOpen">
    <!-- Menú Central -->
    <ul class="nav-menu">
      @for (item of Navitems; track item) {
        <li>
          <p-button
            [icon]="item.icon"
            [label]="item.label"
            [text]="true"
            severity="secondary"
            (click)="scrollToSection(item.section); closeMenu()"
          />
        </li>
      }
    </ul>

    <!-- Redes Sociales (End) -->
    <ul class="sns-bar">
      <p-button
        icon="pi pi-github"
        class="btn-github"
        [text]="true"
        severity="secondary"
        (click)="openLink('https://github.com/DylanMolinaArroyo')"
      />
      <p-button
        icon="pi pi-linkedin"
        class="btn-linkedin"
        [text]="true"
        severity="secondary"
        (click)="openLink('https://linkedin.com/in/dylan-molina-arroyo-457360306')"
      />
      <p-button
        icon="pi pi-envelope"
        class="btn-email"
        [text]="true"
        severity="secondary"
        (click)="openLink('mailto:molina_dylan@outlook.com')"
      />
    </ul>
  </div>
</nav>
