<section id="skills" class="light-section">
  <div class="column content">
    <div class="text-section">
      <h2 class="responsive-title section-title-light">Skills</h2>
      <p class="responsive-text section-text-light">
        I integrate technical proficiency and interpersonal strengths to build high-impact software.
      </p>
    </div>

    <p-carousel
      class="personalized-carousel"
      [value]="skills"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [responsiveOptions]="responsiveOptions"
      autoplayInterval="5000"
    >
      <ng-template pTemplate="item" let-skill>
        <div class="card light-card">
          <div class="card-content">
            <h3 class="card-title">{{ skill.title }}</h3>
            <p class="card-text">{{ skill.description }}</p>
          </div>
        </div>
      </ng-template>
    </p-carousel>

    <div class="tech-stack">
      @for (item of technologies; track item.name) {
        <div class="tech-item" [attr.data-name]="item.name">
          <img [src]="item.icon" />
        </div>
      }
    </div>
  </div>
</section>
