<section id="education" class="dark-section">
  <ul class="section-background">
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>
  <div class="column content">
    <div class="text-section">
      <h2 class="responsive-title" style="color: var(--title-color-dark)">
        Education & Certifications
      </h2>
      <p class="responsive-text" style="color: var(--text-color-dark)">
        Some of the learning experiences that have contributed to my development.
      </p>
    </div>
    <p-carousel
      class="personalized-carousel"
      [value]="items"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [responsiveOptions]="responsiveOptions"
      autoplayInterval="5000"
    >
      <ng-template pTemplate="item" let-education>
        <div class="card dark-card">
          <div class="card-content">
            <div class="card-header">
              <div>
                <div class="card-title">{{ education.feat }}</div>
                <div class="card-subtitle">{{ education.institution }}</div>
              </div>
              <span class="card-year">{{ education.year }}</span>
            </div>

            <div class="card-text">
              <ul>
                @for (desc of education.description; track desc) {
                  <li>{{ desc }}</li>
                }
              </ul>
            </div>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</section>
