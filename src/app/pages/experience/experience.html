<section id="experience" class="dark-section">
  <ul class="section-background">
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>
  <div class="column content">
    <div class="text-section">
      <h2 class="responsive-title" style="color: var(--title-color-dark)">My Work Experience</h2>
      <p class="responsive-text" style="color: var(--text-color-dark)">
        Some of the learning experiences that have contributed to my development.
      </p>
    </div>
    <p-carousel
      [value]="experiences"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [responsiveOptions]="responsiveOptions"
      autoplayInterval="5000"
    >
      <ng-template pTemplate="item" let-experience>
        <div class="card">
          <div class="project-content">
            <div class="card-header">
              <div>
                <div class="role">{{ experience.role }}</div>
                <div class="company">{{ experience.company }}</div>
              </div>
              <span class="year">{{ experience.year }}</span>
            </div>

            <div class="description">
              <ul>
                @for (desc of experience.description; track desc) {
                  <li>{{ desc }}</li>
                }
              </ul>
            </div>
            <div class="project-tags">
              <span *ngFor="let tag of experience.tags" class="tag-badge">{{ tag }}</span>
            </div>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</section>
