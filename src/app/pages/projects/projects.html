<section id="projects" class="light-section">
  <ul class="section-background">
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>
  <div class="column content">
    <div class="text-section">
      <h2 class="responsive-title" style="color: var(--title-color-ligth)">My Projects</h2>
      <p class="responsive-text" style="color: var(--text-color-light)">
        Here are some of the projects that I've worked on
      </p>
    </div>
    <p-carousel
      class="personalized-carousel"
      [value]="projects"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [responsiveOptions]="responsiveOptions"
      autoplayInterval="5000"
    >
      <ng-template pTemplate="item" let-project>
        <div class="card light-card">
          <div class="project-image-container">
            <img [src]="project.image" [alt]="project.title" class="project-image" />
            <p-tag
              [value]="project.status"
              [severity]="getSeverity(project.status)"
              class="status-tag"
            ></p-tag>
          </div>

          <div class="card-content">
            <h3 class="card-title">{{ project.title }}</h3>
            <p class="card-text">{{ project.description }}</p>

            <div class="tags">
              <span *ngFor="let tag of project.tags" class="tag">{{ tag }}</span>
            </div>

            <div class="project-actions">
              <p-button label="Live Demo" icon="pi pi-external-link" [link]="true"></p-button>
              <p-button
                icon="pi pi-github"
                [rounded]="true"
                [text]="true"
                severity="secondary"
              ></p-button>
            </div>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</section>
