<section id="about" class="light-section">
  <div class="floating-icons">
    <div class="floating-icon" style="--i: 1; --x: 12%; --y: 15%"><p>⌨️</p></div>
    <div class="floating-icon" style="--i: 2; --x: 10%; --y: 48%"><p>👓</p></div>
    <div class="floating-icon" style="--i: 3; --x: 78%; --y: 15%"><p>🛡️</p></div>
    <div class="floating-icon" style="--i: 4; --x: 82%; --y: 40%"><p>😃</p></div>
    <div class="floating-icon" style="--i: 5; --x: 12%; --y: 72%"><p>🇨🇷</p></div>
    <div class="floating-icon" style="--i: 6; --x: 80%; --y: 68%"><p>🔒</p></div>
    <div class="floating-icon" style="--i: 7; --x: 36%; --y: 12%"><p>👋</p></div>
    <div class="floating-icon" style="--i: 1; --x: 72%; --y: 78%"><p>☁️</p></div>
    <div class="floating-icon" style="--i: 2; --x: 48%; --y: 80%"><p>🖥️</p></div>
    <div class="floating-icon" style="--i: 3; --x: 62%; --y: 12%"><p>🌴</p></div>
  </div>
  <div class="content">
    <div class="column">
      <div class="text-section">
        <div class="centered-text">
          <h2 class="responsive-title section-title-light" scrollAnimate>About Me</h2>
          <p class="responsive-text section-text-light" scrollAnimate [animateDelay]="100">
            I'm a Costa Rican software engineer passionate about web development, cybersecurity, and
            data. Driven by curiosity and a constant desire to learn, whether it's improving my
            coding skills or building more secure and resilient systems.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
