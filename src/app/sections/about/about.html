<section id="about" class="light-section">

  <div class="content">
    <div class="column">
      <div class="text-section">
        <div class="centered-text">
          <h2 class="responsive-title section-title-light" scrollAnimate>{{ 'ABOUT.TITLE' | translate }}</h2>
          <p class="responsive-text section-text-light" scrollAnimate [animateDelay]="100">
            {{ 'ABOUT.TEXT' | translate }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
