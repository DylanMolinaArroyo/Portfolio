<section id="education" class="dark-section">
  <div class="column content">
    <div class="text-section" scrollAnimate>
      <h2 class="responsive-title section-title-dark">Education & Certifications</h2>
      <p class="responsive-text section-text-dark">
        Some of the learning experiences that have contributed to my development.
      </p>
    </div>
    <app-carousel scrollAnimate [animateDelay]="150" [items]="items" [autoplayInterval]="5000">
      <ng-template let-education>
        <div class="card dark-card">
          <div class="card-content">
            <div class="card-header">
              <div>
                <div class="card-title">{{ education.feat }}</div>
                <div class="card-subtitle">{{ education.institution }}</div>
              </div>
              <span class="card-year">{{ education.year }}</span>
            </div>
            <div class="card-text">
              <ul>
                @for (desc of education.description; track desc) {
                  <li>{{ desc }}</li>
                }
              </ul>
            </div>
          </div>
        </div>
      </ng-template>
    </app-carousel>
  </div>
</section>
