<section id="skills" class="light-section">
  <div class="column content">
    <div class="text-section" scrollAnimate>
      <h2 class="responsive-title section-title-light">{{ 'SKILLS.TITLE' | translate }}</h2>
      <p class="responsive-text section-text-light">{{ 'SKILLS.SUBTITLE' | translate }}</p>
    </div>

    <div class="skills-grid">
      @for (skill of skills; track skill.title; let i = $index) {
        <div class="card light-card" scrollAnimate [animateDelay]="i * 80">
          <div class="card-content">
            <h3 class="card-title">{{ skill.title | translate }}</h3>
            <p class="card-text">{{ skill.description | translate }}</p>
          </div>
        </div>
      }
    </div>

    <div class="tech-stack">
      @for (item of technologies; track item.name; let i = $index) {
        <div class="tech-item" scrollAnimate [animateDelay]="i * 50">
          <img [src]="item.icon" [alt]="item.name" />
          <span class="tech-name">{{ item.name }}</span>
        </div>
      }
    </div>
  </div>
</section>
