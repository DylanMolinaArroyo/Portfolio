<section id="projects" class="light-section">
  <div class="column content">
    <div class="text-section" scrollAnimate>
      <h2 class="responsive-title section-title-light">My Projects</h2>
      <p class="responsive-text section-text-light">
        Here are some of the projects that I've worked on
      </p>
    </div>
    <p-carousel
      scrollAnimate [animateDelay]="150"
      class="personalized-carousel"
      [value]="projects"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [responsiveOptions]="responsiveOptions"
      autoplayInterval="5000"
    >
      <ng-template pTemplate="item" let-project>
        <div class="card light-card">
          <div class="project-image-container">
            <img [src]="project.image" [alt]="project.title" class="project-image" />
            <p-tag
              [value]="project.status"
              [severity]="getSeverity(project.status)"
              class="status-tag"
            ></p-tag>
          </div>
          <div class="card-content">
            <h3 class="card-title">{{ project.title }}</h3>
            <p class="card-text">{{ project.description }}</p>
            <div class="tags">
              @for (tag of project.tags; track tag) {
                <span class="tag">{{ tag }}</span>
              }
            </div>
            <div class="project-actions">
              <a [href]="project.link" target="_blank" rel="noopener noreferrer" class="btn-action btn-demo">
                <img src="assets/icons/ui/external-link.svg" class="ui-icon" alt="">
                Live Demo
              </a>
              <a [href]="project.code" target="_blank" rel="noopener noreferrer" class="btn-action btn-code" aria-label="View code">
                <img src="assets/icons/ui/github.svg" class="ui-icon" alt="">
              </a>
            </div>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</section>
