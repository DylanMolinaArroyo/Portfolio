<section id="home" class="dark-section">
  <div class="responsive-grid content">
    <div class="column" scrollAnimate>
      <div class="divider">
        <h1 class="responsive-title section-title-dark">Dylan Molina Arroyo</h1>
        <h3 class="responsive-subtitle section-subtitle-dark">{{ 'HOME.SUBTITLE' | translate }}</h3>
        <div class="location-container cr-link">
          <img src="assets/icons/ui/map-pin.svg" class="location-icon ui-icon" alt="" />
          <a
            href="https://www.google.com/maps/place/Costa+Rica"
            target="_blank"
            rel="noopener noreferrer"
            class="location-link"
          >
            Costa Rica, Alajuela, San Carlos
          </a>
        </div>
        <div class="home-sns">
          <a
            href="https://github.com/DylanMolinaArroyo"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-sns btn-github"
            aria-label="GitHub"
          >
            <img src="assets/icons/ui/github.svg" class="ui-icon" alt="" />
          </a>
          <a
            href="https://linkedin.com/in/dylan-molina-arroyo-457360306"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-sns btn-linkedin"
            aria-label="LinkedIn"
          >
            <img src="assets/icons/ui/linkedin.svg" class="ui-icon" alt="" />
          </a>
          <a href="mailto:molina_dylan@outlook.com" class="btn-sns btn-email" aria-label="Email">
            <img src="assets/icons/ui/mail.svg" class="ui-icon" alt="" />
          </a>
        </div>
      </div>
    </div>
    <div class="column" scrollAnimate [animateDelay]="150">
      <picture>
        <source srcset="./assets/images/avatar.webp" type="image/webp" />
        <img class="avatar-image" src="./assets/images/avatar.jpg" alt="Avatar" loading="lazy" />
      </picture>
    </div>
  </div>
</section>
