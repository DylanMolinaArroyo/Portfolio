<section id="home" class="dark-section">
  <div class="responsive-grid content">
    <div class="column" scrollAnimate>
      <div class="divider">
        <h1 class="responsive-title section-title-dark">Dylan Molina Arroyo</h1>
        <h3 class="responsive-subtitle">Computer Engineer</h3>
        <div class="location-container cr-link">
          <img src="assets/icons/ui/map-pin.svg" class="location-icon ui-icon" alt="">
          <a
            href="https://www.google.com/maps/place/Costa+Rica"
            target="_blank"
            rel="noopener noreferrer"
            class="location-link"
          >
            Costa Rica
          </a>
        </div>
      </div>
    </div>
    <div class="column" scrollAnimate [animateDelay]="150">
      <img class="avatar-image" src="./assets/images/avatar.svg" alt="Avatar" />
    </div>
  </div>
</section>
