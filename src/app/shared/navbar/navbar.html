<nav class="navbar" [class.scrolled]="hasShadow">
  <!-- Logo — mobile top bar only -->
  <div class="nav-start">
    <div class="logo" (click)="scrollToSection('home')">
      <img src="assets/icons/page/portfolio.svg" class="page-icon" alt="" />
      <span>DylanMA</span>
    </div>
  </div>

  <!-- Hamburger -->
  <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Toggle menu">
    @if (menuOpen) {
      <img src="assets/icons/ui/x.svg" class="ui-icon" alt="Close menu" />
    } @else {
      <img src="assets/icons/ui/menu.svg" class="ui-icon" alt="Open menu" />
    }
  </button>

  <div class="nav-content" [class.active]="menuOpen">
    <!-- Logo — desktop nav-content only -->
    <div class="logo nav-content-logo" (click)="scrollToSection('home')">
      <img src="assets/icons/page/portfolio.svg" class="page-icon" alt="" />
      <span>DylanMA</span>
    </div>

    <!-- Nav items -->
    <ul class="nav-menu">
      @for (item of navItems; track item) {
        <li>
          <button
            class="btn-nav"
            [class.active]="activeSection === item.section"
            (click)="scrollToSection(item.section); closeMenu()"
          >
            <img [src]="item.icon" class="ui-icon" alt="" />
            <span>{{ item.label | translate }}</span>
          </button>
        </li>
      }
    </ul>

    <!-- Language toggle -->
    <button
      class="btn-lang"
      (click)="toggleLang()"
      [attr.aria-label]="'Switch language to ' + (currentLang === 'en' ? 'ES' : 'EN')"
    >
      <img
        [src]="'assets/icons/languages/' + (currentLang === 'en' ? 'es' : 'en') + '.svg'"
        class="lang-icon"
        [alt]="''"
      />
      <span>{{ currentLang === 'en' ? 'ES' : 'EN' }}</span>
    </button>
  </div>
</nav>
