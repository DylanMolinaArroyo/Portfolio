<nav class="navbar" [class.scrolled]="hasShadow">
  <!-- Logo -->
  <div class="nav-start">
    <div class="logo" (click)="scrollToSection('home')">
      <img src="assets/icons/page/portfolio.svg" class="page-icon" alt="" />
      <span>Portfolio</span>
    </div>
  </div>

  <!-- Hamburger -->
  <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Toggle menu">
    @if (menuOpen) {
      <img src="assets/icons/ui/x.svg" class="ui-icon" alt="Close menu" />
    } @else {
      <img src="assets/icons/ui/menu.svg" class="ui-icon" alt="Open menu" />
    }
  </button>

  <div class="nav-content" [class.active]="menuOpen">
    <!-- Nav items -->
    <ul class="nav-menu">
      @for (item of navItems; track item) {
        <li>
          <button class="btn-nav" (click)="scrollToSection(item.section); closeMenu()">
            <img [src]="item.icon" class="ui-icon" alt="" />
            <span>{{ item.label | translate }}</span>
          </button>
        </li>
      }
    </ul>

    <!-- Language toggle -->
    <button class="btn-lang" (click)="toggleLang()" [attr.aria-label]="'Switch language to ' + (currentLang === 'en' ? 'ES' : 'EN')">
      {{ currentLang === 'en' ? 'ES' : 'EN' }}
    </button>

    <!-- Social links -->
    <ul class="sns-bar">
      <button
        class="btn-sns btn-github"
        (click)="openLink('https://github.com/DylanMolinaArroyo')"
        aria-label="GitHub"
      >
        <img src="assets/icons/ui/github.svg" class="ui-icon" alt="" />
      </button>
      <button
        class="btn-sns btn-linkedin"
        (click)="openLink('https://linkedin.com/in/dylan-molina-arroyo-457360306')"
        aria-label="LinkedIn"
      >
        <img src="assets/icons/ui/linkedin.svg" class="ui-icon" alt="" />
      </button>
      <button
        class="btn-sns btn-email"
        (click)="openLink('mailto:molina_dylan@outlook.com')"
        aria-label="Email"
      >
        <img src="assets/icons/ui/mail.svg" class="ui-icon" alt="" />
      </button>
    </ul>
  </div>
</nav>
