<!doctype html>
<html lang="es">
  <head>
    <style>
      :root {
        --bg-color: #0a0a0c;
        --card-bg: #111114;
        --accent: #e94560;
        --text-dim: #666;
      }

      body {
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Inter', sans-serif;
      }

      .tech-stack-minimal {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 30px;
        max-width: 600px;
        width: 100%;
        padding: 20px;
      }

      .tech-item {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Estilo del icono (puedes usar SVGs o Iconos de Fuente) */
      .tech-item i,
      .tech-item img {
        font-size: 2.5rem;
        color: var(--text-dim);
        filter: grayscale(100%) opacity(0.6);
        transition: all 0.3s ease;
      }

      /* Tooltip: El nombre que aparece al pasar el mouse */
      .tech-item::after {
        content: attr(data-name);
        position: absolute;
        bottom: -30px;
        background: var(--accent);
        color: white;
        padding: 4px 10px;
        font-size: 0.7rem;
        border-radius: 4px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Efectos Hover */
      .tech-item:hover {
        transform: translateY(-5px);
      }

      .tech-item:hover i,
      .tech-item:hover img {
        filter: grayscale(0%) opacity(1);
        color: var(--accent); /* O el color original si usas SVGs */
      }

      .tech-item:hover::after {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />
  </head>
  <body>
    <div class="tech-stack-minimal">
      <div class="tech-item" data-name="Angular">
        <i class="pi pi-prime"></i>
      </div>

      <div class="tech-item" data-name="TypeScript">
        <i class="pi pi-code"></i>
      </div>

      <div class="tech-item" data-name="Node.js">
        <i class="pi pi-server"></i>
      </div>

      <div class="tech-item" data-name="AWS">
        <i class="pi pi-cloud"></i>
      </div>

      <div class="tech-item" data-name="Docker">
        <i class="pi pi-box"></i>
      </div>

      <div class="tech-item" data-name="PostgreSQL">
        <i class="pi pi-database"></i>
      </div>

      <div class="tech-item" data-name="GitHub">
        <i class="pi pi-github"></i>
      </div>
    </div>
  </body>
</html>
